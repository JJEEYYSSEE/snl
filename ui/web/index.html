<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snakes &amp; Lenders</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <h1>🐍 Snakes &amp; Lenders</h1>

  <!-- ── Title / start page ── -->
  <section id="title">
    <h2>Welcome</h2>
    <p class="hint">A strategic Snakes &amp; Ladders — earn points, buy snakes,
      sabotage your rivals. First to tile 100 wins.</p>
    <button id="playBtn">Play</button>
  </section>

  <!-- ── Setup screen ── -->
  <section id="setup" class="hidden">
    <h2>New Game</h2>
    <label>Players
      <select id="players">
        <option>2</option><option>3</option><option>4</option>
      </select>
    </label>
    <label>Humans
      <select id="humans">
        <option>0</option><option selected>1</option>
        <option>2</option><option>3</option><option>4</option>
      </select>
    </label>
    <label>Hard AIs <span class="hint">(rest Easy)</span>
      <select id="hardais">
        <option>0</option><option>1</option><option>2</option><option>3</option>
      </select>
    </label>
    <button id="startBtn">Start</button>
    <button id="backBtn" class="secondary">Back</button>
    <p class="hint">e.g. 4 players, 2 humans, 1 Hard AI → you + a friend + 1 Hard
      + 1 Easy. Humans take turns on screen; AI plays automatically.</p>
  </section>

  <!-- ── Loading overlay ── -->
  <div id="loading" class="overlay hidden">
    <div class="loadbox">
      <h2>Initializing…</h2>
      <div class="bar"><div id="barFill"></div></div>
      <div id="loadMsg" class="msg"></div>
    </div>
  </div>

  <!-- ── Game screen ── -->
  <section id="game" class="hidden">
    <div id="boardWrap"><div id="board"></div></div>
    <aside id="panel">
      <div id="turnInfo"></div>
      <div id="players"></div>
      <div id="shop" class="hidden">
        <h3>Snake Shop</h3>
        <label>Head <input id="head" type="number" min="20" max="90" /></label>
        <label>Tail <input id="tail" type="number" min="1" max="89" /></label>
        <button id="buyBtn">Buy snake</button>
        <div id="shopMsg" class="msg"></div>
      </div>
      <button id="rollBtn">Roll / Next turn</button>
      <button id="newBtn" class="secondary">New game</button>
      <div id="winner" class="hidden"></div>
      <h3>Log</h3>
      <div id="log"></div>
    </aside>
  </section>

  <script src="/app.js"></script>
</body>
</html>
